<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--link do css-->
  <link rel="stylesheet" href="./css/style.css">
  <title>Coffe House</title>
</head>

<body>
  <!--Logo e menu com Início   Cardápio   Promoções   Contato--->
  <header role="banner">
    <div class="container">
      <div class="logo">
        <img src="/images/logo.png" alt="Logo da Coffee House">
      </div>
      <input type="checkbox" id="menu-toggle">


      <label for="menu-toggle" class="menu-toggle" aria-label="Abrir menu">
        <span></span>
      </label>
      <nav role="navigation" aria-label="Menu principal">
        <ul>
          <li><a href="#inicio">Início</a></li>
          <li><a href="#cardapio">Cardápio</a></li>
          <li><a href="#promocoes">Promoções</a></li>
          <li><a href="#contato">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <!--Banner da cafeteria e frase "Venha conhecer a nossa cafeteria!"-->
  <main role="main">
    <section id="inicio">
      <div class="banner">
        <picture>

          <source media="(max-width:768px)" srcset="/images/banner.png">

          <img src="/images/banner.png" alt="Coffee House">

        </picture>
      </div>
      <div class="banner-texto">
        <h1>Venha conhecer a nossa cafeteria!</h1>
      </div>
    </section>
    <!--saiba mais--->
    <section id="saiba-mais">
      <h2>Saiba mais sobre a Coffee House</h2>
      <p>A Coffee House é o lugar perfeito para os amantes de café. Oferecemos uma variedade de bebidas quentes e frias,
        além de deliciosos acompanhamentos.</p>
    </section>
  </main>
  <footer role="contentinfo">

    <p>© 2026 Coffee House</p>

  </footer>
</body>

</html>
